name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    name: Run tests and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Build project
        run: pnpm build

      # Add tests here if you have them, e.g.:
      # - name: Run tests
      #   run: pnpm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare server directories
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p ~/fintech-messenger
            rm -rf ~/fintech-messenger/repo
            mkdir -p ~/fintech-messenger/repo
            # Clean up only the accidental containers created by the previous messenger deploy.
            # Do not touch existing pay containers such as app-pay-frontend-1 or app-nginx-proxy-1.
            docker rm -f app-nginx-1 app-certbot-1 app-backend-1 app-admin-panel-1 app-user-panel-1 app-postgres-1 app-redis-1 2>/dev/null || true

      - name: Copy deployment manifests to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.prod.yml,docker-compose.prod.build.yml"
          target: "~/fintech-messenger"

      - name: Copy application source to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: ".dockerignore,package.json,pnpm-lock.yaml,pnpm-workspace.yaml,turbo.json,apps/**,packages/**"
          target: "~/fintech-messenger/repo"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ~/fintech-messenger
            
            # 1. Backup current env for rollback
            [ -f .env ] && cp .env .env.bak
            
            # 2. Write new configuration
            echo "${{ secrets.ENV_FILE }}" > .env
            # Keep image vars for compatibility, but services are built locally on server.
            echo "IMAGE_BACKEND=fintech-backend:prod" >> .env
            echo "IMAGE_ADMIN=fintech-admin:prod" >> .env
            echo "IMAGE_USER=fintech-user:prod" >> .env
            
            # 3. Build fresh images from copied source and start stack
            docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml build --no-cache backend admin-panel user-panel
            docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml up -d postgres redis
            for i in {1..30}; do
              if docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml exec -T postgres pg_isready -U messenger -d messenger; then
                break
              fi
              echo "Waiting for postgres (attempt $i/30)..."
              sleep 2
            done
            docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml run -T --rm --no-deps -e VIRTUAL_HOST= -e LETSENCRYPT_HOST= -e LETSENCRYPT_EMAIL= backend pnpm dlx prisma@6.9.0 migrate deploy --schema=./prisma/schema.prisma
            docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml run -T --rm --no-deps -e VIRTUAL_HOST= -e LETSENCRYPT_HOST= -e LETSENCRYPT_EMAIL= backend node <<'NODE'
            const { PrismaClient } = require('@prisma/client');
            const bcrypt = require('bcrypt');

            const prisma = new PrismaClient();
            const email = process.env.INITIAL_ADMIN_EMAIL || 'admin@example.com';
            const password = process.env.INITIAL_ADMIN_PASSWORD || 'admin123';
            const name = process.env.INITIAL_ADMIN_NAME || 'Super Admin';

            async function main() {
              const existingAdmin = await prisma.user.findUnique({ where: { email } });
              if (existingAdmin) {
                console.log(`Initial admin ${email} already exists.`);
                return;
              }

              const passwordHash = await bcrypt.hash(password, 10);
              await prisma.user.create({
                data: {
                  email,
                  passwordHash,
                  name,
                  role: 'SUPER_ADMIN',
                },
              });
              console.log(`Initial admin ${email} created.`);
            }

            main()
              .catch((error) => {
                console.error(error);
                process.exit(1);
              })
              .finally(async () => {
                await prisma.$disconnect();
              });
            NODE
            docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml up -d
            
            # 4. Health Check Logic
            echo "Container status after startup:"
            docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml ps

            echo "Checking backend inside the backend container..."
            INTERNAL_SUCCESS=false
            for i in {1..12}; do
              echo "Checking internal health (attempt $i/12)..."
              if docker exec fintech_messenger-backend-1 node -e "fetch('http://127.0.0.1:3000/health').then(r => r.text()).then(t => { console.log(t); process.exit(t.includes('ok') ? 0 : 1) }).catch(err => { console.error(err); process.exit(1) })"; then
                INTERNAL_SUCCESS=true
                break
              fi
              sleep 5
            done

            if [ "$INTERNAL_SUCCESS" = false ]; then
              echo "Backend is unhealthy inside its own container."
              docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml logs --tail=200 backend
              exit 1
            fi

            echo "Starting external health check..."
            HEALTH_URL="https://api.msg.fintech-consult.ru/health"
            SUCCESS=false
            
            for i in {1..24}; do
              echo "Checking health (attempt $i/24)..."
              # Ignore self signed certs just in case it's still provisioning
              if curl -k -L -s -f "$HEALTH_URL" | grep -q "ok"; then
                echo "Application is HEALTHY!"
                SUCCESS=true
                break
              fi
              sleep 5
            done
            
            if [ "$SUCCESS" = false ]; then
              echo "Application is UNHEALTHY! Rolling back..."
              echo "Recent messenger logs:"
              docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml logs --tail=120
              echo "Relevant proxy containers:"
              docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}' | grep -E 'nginx|proxy|acme|companion|fintech_messenger' || true
              echo "Checking whether nginx-proxy generated routes for msg domains:"
              docker exec app-nginx-proxy-1 sh -c "nginx -T 2>/dev/null | grep -nE 'msg.fintech-consult.ru|api.msg.fintech-consult.ru|admin.msg.fintech-consult.ru' -A 12 -B 3" || true
              echo "Recent nginx-proxy logs:"
              docker logs --tail=120 app-nginx-proxy-1 || true
              echo "Recent acme-companion logs:"
              docker logs --tail=120 app-acme-companion-1 || true
              if [ -f .env.bak ]; then
                mv .env.bak .env
                docker compose -p fintech_messenger -f docker-compose.prod.yml -f docker-compose.prod.build.yml up -d
                echo "Rollback to previous version completed."
              else
                echo "No backup env found, cannot rollback automatically."
              fi
              exit 1
            else
              echo "Deployment successful."
              rm -f .env.bak
              docker image prune -f
            fi
